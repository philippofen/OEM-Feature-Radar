name: Daily OEM Crawl

on:
  schedule:
    # 06:00 UTC = 07:00 MEZ / 08:00 MESZ
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      oem:
        description: 'OEM-Slug (leer = alle)'
        required: false
        default: ''
      dry_run:
        description: 'Dry-Run (keine Posts veröffentlichen)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: daily-crawl-${{ github.ref }}
  cancel-in-progress: false

jobs:
  crawl:
    name: Crawl ${{ matrix.oem }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      # Ein OEM-Fehler soll nicht die anderen Jobs stoppen
      fail-fast: false
      matrix:
        # Auf manuellen Runs mit gesetztem OEM läuft nur dieser eine
        oem:
          - bmw
          - audi
          - mercedes
          - porsche
          - vw

    steps:
      - name: Skip non-matching OEM on manual dispatch
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.oem != '' && github.event.inputs.oem != matrix.oem }}
        run: |
          echo "Skip ${{ matrix.oem }} (manual run targets '${{ github.event.inputs.oem }}')"
          exit 0

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install chromium --with-deps

      - name: Run daily crawl
        env:
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
          PROXY_URL:             ${{ secrets.PROXY_URL }}
          STORAGE_BUCKET:        ${{ vars.STORAGE_BUCKET || 'oem-snapshots' }}
          LOG_LEVEL:             info
        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          npx tsx scripts/run-daily.ts --oem ${{ matrix.oem }} $DRY_FLAG

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.oem }}-${{ github.run_id }}
          path: |
            *.log
          if-no-files-found: ignore
          retention-days: 7
